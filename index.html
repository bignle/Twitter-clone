<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter| Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" href="Assets/icon.png"  type="image">
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="navigation">
        <div class="left-icons">
            <ul class="left-icons-list">
                <li>
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </li>
                <li>
                    <i class="bi bi-search"></i>
                    <span>Explore</span>
                </li>
                <li>
                    <i class="bi bi-bell"></i>
                    <span>Notifications</span>
                </li>
                <li>
                    <i class="bi bi-person-plus-fill"></i>
                    <span>Follow</span>
                </li>
                <li>
                    <i class="bi bi-envelope"></i>
                    <span>Chat</span>
                </li>
                <li>
                    <i class="bi bi-bookmark"></i>
                    <span>Bookmarks</span>
                </li>
                <li>
                    <i class="bi bi-rocket-takeoff"></i>
                    <span>Creator Studio</span>
                </li>

                <li>
                    <i class="bi bi-house-door-fill"></i>
                    <span>Follow</span>
                </li>
                <li>
                    <span><p><img src="Assets/grok.svg" alt="grok" width="16" height="16" >Grok</p></span>
                </li>
                <li>
                    <i class="bi bi-twitter-x"></i>
                    <span>Premium</span>
                </li>
                <li>
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </li>
                <li>
                    <i class="bi bi-three-dots"></i>
                    <span>More</span>
                </li>
                <li>
                    <i class="bi bi-feather"></i>
                    <button class="post-button">Post</button>
                </li>
            </ul>
        </div>


        <div class="profile-footer">
            <h3>Nkazimulo Mnisi<i class="bi bi-person-circle"></i></h3>
            <h3>@NkazimuloMnisi</h3>

        </div>

    </div>

    <div class="feed" >
        <div class="top-center-row">
            <h3>For you</h3>
            <h3>Following</h3>
              <div class="navigation-icon-feed">
                <li>
                    <i class="bi bi-image"></i>
                    <span>Media</span>
                </li>
                <li>
                    <i class="bi bi-filetype-gif"></i>
                    <span>Gif</span>
                </li>
                <li>
                    <span><p><img src="Assets/grok.svg" alt="grok" width="16" height="16" >Grok</p></span>
                </li>
                <li>
                    <i class="bi bi-feather"></i>
                    <span>Post</span>
                </li>
                <li>
                    <i class="bi bi-list-ul"></i>
                    <span>Poll</span>
                </li>
                <li>
                    <i class="bi bi-geo-alt"></i>
                    <span>Navigation</span>
                </li>
                <li>
                    <i class="bi bi-flag"></i>
                    <span>Content Disclosure</span>
                </li>
              </div>
            <div class="post">
                <h3>Post</h3>
            </div> 
        </div>
    </div>

        <div class="trends" id="right">
            <div class="search-trends">
                <button class="search-button">Search</button>

            </div>
        </div>
    
</body>
</html>
